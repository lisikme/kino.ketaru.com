// Функция для формирования HTML-списка фильмов
function generateFilmList() {

    FilmsList.forEach((film, index) => {
        const filmIndex = FilmsList.length - index;  // Переворачиваем порядок номеров фильмов

        filmsHTML += `
            <section class="hero1"><div class="container"><div class="hero-inner"><div class="hero-copy"><div class="film"><h1 class="items">
                <span class="item1">${film.Title}</span><p>
                <span class="item2">${film.AgeLimit}</span></p></h1></div>
                <div class="im"><img src="./pages/${filmIndex}/image.png" class="image" loading="lazy" onerror="this.style.visibility = 'hidden'" width="170px" height = "250px"><div class="hero-cta">
                <a class="buttonn" href="./pages?id=${filmIndex}">Смотреть</a>
            </section>
        `;
    });

    container.innerHTML = filmsHTML;  // Вставляем сформированный HTML в контейнер
}

// Функция для отображения или скрытия кнопки очистки

}

// Функция для перенаправления с параметром id

const enToRuLayout = {
    q: 'й', w: 'ц', e: 'у', r: 'к', t: 'е', y: 'н', u: 'г', i: 'ш', o: 'щ',
    p: 'з', '[': 'х', ']': 'ъ', a: 'ф', s: 'ы', d: 'в', f: 'а', g: 'п', h: 'р',
    j: 'о', k: 'л', l: 'д', ';': 'ж', "'": 'э', z: 'я', x: 'ч', c: 'с', v: 'м',
    b: 'и', n: 'т', m: 'ь', ',': 'б', '.': 'ю', '/': '.',
    
    Q: 'Й', W: 'Ц', E: 'У', R: 'К', T: 'Е', Y: 'Н', U: 'Г', I: 'Ш', O: 'Щ',
    P: 'З', '{': 'Х', '}': 'Ъ', A: 'Ф', S: 'Ы', D: 'В', F: 'А', G: 'П', H: 'Р',
    J: 'О', K: 'Л', L: 'Д', ':': 'Ж', '"': 'Э', Z: 'Я', X: 'Ч', C: 'С', V: 'М',
    B: 'И', N: 'Т', M: 'Ь', '<': 'Б', '>': 'Ю', '?': '.', '^': ":"
};
const ruToEnLayout = Object.fromEntries(Object.entries(enToRuLayout).map(([key, value]) => [value, key]));

// Функция для исправления раскладки
function fixKeyboardLayout(text, layoutMap) {
    return text.split('').map(char => layoutMap[char] || char).join('');
}

// Функция для очистки строки от пробелов и спецсимволов
function processSearchQuery(query) {
    return fixKeyboardLayout(query, ruToEnLayout).replace(/[^a-zA-Zа-яА-Я0-9]/g, '').toLowerCase();
}



function collectRelatedChars(char) {
    const visited = new Set();
    const queue = [char];
    const related = new Set();
    while (queue.length > 0) {
        const current = queue.pop();
        if (visited.has(current)) continue;
        visited.add(current);
        related.add(current);
        const enVariant = ruToEnLayout[current];
        if (enVariant && !visited.has(enVariant)) queue.push(enVariant);
        const ruVariant = enToRuLayout[current];
        if (ruVariant && !visited.has(ruVariant)) queue.push(ruVariant);
    }
    return Array.from(related);
}
function getVariants(char) {
    const baseChars = [char, char.toUpperCase(), char.toLowerCase()];
    const allRelated = new Set();
    for (const c of baseChars) {
        collectRelatedChars(c).forEach(r => allRelated.add(r));
    }
    const withCases = [];
    for (const r of allRelated) {
        withCases.push(r.toUpperCase());
        withCases.push(r.toLowerCase());
    }
    withCases.push(...allRelated);
    const uniqueVariants = Array.from(new Set(withCases))
        .filter(c => c && c !== '')
        .map(c => c.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
    return uniqueVariants;
}
// Пример использования:
const generateRegexVariants = (char) => {
    const variants = getVariants(char);
    return `${variants.join('')}`;
};




function highlightText(originalText, searchTerm) {
    if (!searchTerm) return originalText;
    const cleanedSearchTerm = searchTerm;
    if (!cleanedSearchTerm) return originalText;
    const pattern = cleanedSearchTerm.split('').map(char => {
        const lowerChar = char.toLowerCase();
        const upperChar = char.toUpperCase();
        // Получаем варианты для текущего регистра и нижнего
        const enVariant = char;
        const ruVariant = char;
        // Собираем все возможные варианты
        const variants = generateRegexVariants(char);
        return `[${variants}]`;
    }).join('[^а-яА-ЯёЁa-zA-Z0-9]*');
    const regex = new RegExp(`(${pattern})`, 'gi');
    return originalText.replace(regex, '<strong>$1</strong>');
}

// Функция для обновления количества фильмов и подсказок
function updateFilmCount(searchTerm = "") {
    const movies = document.querySelectorAll(".hero1");
    let found = 0;
    let suggestions = [];
    
    const autocompleteBox = document.getElementById("autocomplete-box");
    autocompleteBox.innerHTML = "";
    
    // Нормализованный текст для правильной раскладки
    const normalizedSearchTermEn = processSearchQuery(searchTerm);
    const normalizedSearchTermRu = fixKeyboardLayout(normalizedSearchTermEn, enToRuLayout);
    
    if (searchTerm.trim() === "") {
        found = movies.length;
        movies.forEach(movie => {
            movie.style.display = "block";
            movie.querySelector(".item1").innerHTML = movie.querySelector(".item1").textContent; // Очищаем подсветку
        });
    } else {
        movies.forEach(movie => {
            const title = movie.querySelector(".item1").textContent;
            const cleanedTitle = processSearchQuery(title);

            // Проверяем и показываем фильм, если его заголовок соответствует правильной раскладке
            if (cleanedTitle.includes(normalizedSearchTermEn) || cleanedTitle.includes(normalizedSearchTermRu)) {
                movie.style.display = "block";
                found++;

                // Подсвечиваем текст для правильной раскладки
                const highlightedTitle = highlightText(title, searchTerm);
                movie.querySelector(".item1").innerHTML = highlightedTitle;

                if (suggestions.length < 500 && !suggestions.includes(title)) {
                    suggestions.push(title);  // Оставляем оригинальный регистр
                }
            } else {
                movie.style.display = "none";
            }
        });
    }
    
    document.getElementById("count-film").textContent = `${found}`;
    document.querySelector(".hero3").style.display = found === 0 ? "block" : "none";
    
    // Генерация подсказок только для правильной раскладки, но с подсветкой
    suggestions.forEach(suggestion => {
        const div = document.createElement("div");
        div.classList.add("autocomplete-item");

        const highlightedSuggestion = highlightText(suggestion, searchTerm);
        div.innerHTML = highlightedSuggestion;

        // Добавляем обработчик клика на подсказку
        div.addEventListener("click", () => {
            document.getElementById("searchBar").value = suggestion; // Меняем текст в поле ввода на подсказку
            updateFilmCount(suggestion); // Обновляем фильмы по выбранной подсказке
        });
        autocompleteBox.appendChild(div);
    });
    
    // Добавлена проверка, чтобы скрыть поле подсказок, если оно пустое
    autocompleteBox.style.display = suggestions.length > 0 ? "block" : "none";
}

// Обработчик события input для поиска
const searchBar = document.getElementById('searchBar');
searchBar.addEventListener('input', function() {
    updateFilmCount(this.value);
    // Показываем или скрываем кнопку очистки в зависимости от содержимого
    toggleClearButton();
});

// Обработчик события focus для поля поиска
searchBar.addEventListener('focus', function() {
    const autocompleteBox = document.getElementById("autocomplete-box");
    // Показываем подсказки только если они есть
    autocompleteBox.style.display = autocompleteBox.childElementCount > 0 ? "block" : "none";
});

// Обработчик события blur для поля поиска
searchBar.addEventListener('blur', function() {
    setTimeout(() => document.getElementById("autocomplete-box").style.display = "none", 200);
});

// Инициализация кнопки очистки при загрузке страницы
document.addEventListener('DOMContentLoaded', function() {
    toggleClearButton();  // Скрыть или показать кнопку очистки в зависимости от состояния поля
    updateFilmCount();
    redirectToPageWithId();  // Переадресация с id
});

</script>
